{% extends 'base.html' %}
{% block title %}Add Technician — VoterX Admin{% endblock %}

{% block content %}
<div style="min-height:calc(100vh - 72px); background:var(--navy); display:flex; align-items:center; justify-content:center; padding:4rem 1.5rem;">
  <div style="width:100%; max-width:480px;">
    <a href="{% url 'admin_technicians' %}" style="color:rgba(255,255,255,0.4); font-size:0.85rem; text-decoration:none; display:inline-flex; align-items:center; gap:4px; margin-bottom:1.5rem;">
      ← Back to Technicians
    </a>

    <div style="background:white; border-radius:var(--radius); padding:2.5rem; box-shadow:0 24px 80px rgba(0,0,0,0.3);">
      <h1 style="font-size:1.75rem; margin:0 0 0.5rem; color:var(--navy);">Add Technician</h1>
      <p style="color:#64748b; font-size:0.9rem; margin:0 0 2rem;">Create a new technician account</p>

      {% if messages %}{% for message in messages %}
      <div style="background:#fef2f2; border:1px solid #fecaca; color:#dc2626; padding:0.75rem 1rem; border-radius:8px; font-size:0.875rem; margin-bottom:1.25rem;">{{ message }}</div>
      {% endfor %}{% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-input" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-input" placeholder="tech@voterx.co.ke" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" name="phone" class="form-input" placeholder="+254 700 000 000">
        </div>
        <div class="form-group" style="margin-bottom:1.75rem;">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn-primary" style="display:block; width:100%; padding:1rem; font-size:1rem; text-align:center; border:none; cursor:pointer;">
          Add Technician →
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
