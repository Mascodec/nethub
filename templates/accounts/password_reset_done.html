{% extends 'base.html' %}

{% block title %}Password Reset Sent — VoterX{% endblock %}

{% block content %}
<div style="min-height:calc(100vh - 72px); background:var(--navy); display:flex; align-items:center; justify-content:center; padding:4rem 1.5rem;">
  <div style="width:100%; max-width:480px; background:white; border-radius:var(--radius); padding:2.5rem; box-shadow:0 24px 80px rgba(0,0,0,0.25); text-align:center;">
    <h1 style="font-size:1.6rem; margin:0 0 0.6rem; color:var(--navy);">Check your email</h1>
    <p style="color:#64748B; margin:0 0 1.5rem;">If an account exists for that email, we’ve sent a password reset link.</p>
    <a href="{% url 'login' %}" class="btn-primary">Back to Sign In</a>
  </div>
</div>
{% endblock %}
