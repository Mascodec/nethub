{% extends 'base.html' %}

{% block title %}Set New Password — VoterX{% endblock %}

{% block content %}
<div style="min-height:calc(100vh - 72px); background:var(--navy); display:flex; align-items:center; justify-content:center; padding:4rem 1.5rem;">
  <div style="width:100%; max-width:480px; background:white; border-radius:var(--radius); padding:2.5rem; box-shadow:0 24px 80px rgba(0,0,0,0.25);">
    <h1 style="font-size:1.6rem; margin:0 0 0.6rem; color:var(--navy);">Set a new password</h1>
    <p style="color:#64748B; margin:0 0 1.5rem;">Choose a strong password for your account.</p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn-primary" style="display:block; width:100%; padding:1rem; font-size:1rem; text-align:center; border:none; cursor:pointer; margin-top:1rem;">
        Save New Password
      </button>
    </form>
  </div>
</div>
{% endblock %}
