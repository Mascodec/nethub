{% extends 'base.html' %}

{% block title %}Reset Password — VoterX{% endblock %}

{% block content %}
<div style="min-height:calc(100vh - 72px); background:var(--navy); display:flex; align-items:center; justify-content:center; padding:4rem 1.5rem;">
  <div style="width:100%; max-width:480px; background:white; border-radius:var(--radius); padding:2.5rem; box-shadow:0 24px 80px rgba(0,0,0,0.25);">
    <h1 style="font-size:1.6rem; margin:0 0 0.6rem; color:var(--navy);">Reset your password</h1>
    <p style="color:#64748B; margin:0 0 1.5rem;">Enter your email address and we’ll send you a link to create a new password.</p>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="you@company.co.ke" required autofocus>
      </div>
      <button type="submit" class="btn-primary" style="display:block; width:100%; padding:1rem; font-size:1rem; text-align:center; border:none; cursor:pointer; margin-top:1rem;">
        Send Reset Link
      </button>
    </form>

    <div style="text-align:center; margin-top:1.5rem;">
      <a href="{% url 'login' %}" style="color:var(--orange); text-decoration:none; font-weight:600;">Back to sign in</a>
    </div>
  </div>
</div>
{% endblock %}
